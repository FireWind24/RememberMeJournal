<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .icon-bg { fill: #FFFDD0; }
      .petal { fill: #D4848A; }
      .petal-inner { fill: #E8A0A8; }
      .leaf { fill: #8AB49A; }
      .leaf-dark { fill: #5A8A6A; }
      .center { fill: #F6C95E; }
      .center-dot { fill: #C8960A; }
      .stem { fill: none; stroke: #5A8A6A; stroke-width: 14; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="512" height="512" rx="110" class="icon-bg"/>

  <path d="M256 320 Q230 370 220 420" class="stem"/>

  <ellipse cx="208" cy="388" rx="40" ry="18" transform="rotate(-40 208 388)" class="leaf"/>
  <ellipse cx="212" cy="392" rx="28" ry="10" transform="rotate(-40 212 392)" class="leaf-dark"/>

  <g transform="translate(256,240)">
    <ellipse cx="0" cy="-88" rx="30" ry="60" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" class="petal-inner"/>
    <ellipse cx="0" cy="-88" rx="30" ry="60" transform="rotate(60)" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" transform="rotate(60)" class="petal-inner"/>
    <ellipse cx="0" cy="-88" rx="30" ry="60" transform="rotate(120)" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" transform="rotate(120)" class="petal-inner"/>
    <ellipse cx="0" cy="-88" rx="30" ry="60" transform="rotate(180)" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" transform="rotate(180)" class="petal-inner"/>
    <ellipse cx="0" cy="-88" rx="30" ry="60" transform="rotate(240)" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" transform="rotate(240)" class="petal-inner"/>
    <ellipse cx="0" cy="-88" rx="30" ry="60" transform="rotate(300)" class="petal"/>
    <ellipse cx="0" cy="-88" rx="18" ry="42" transform="rotate(300)" class="petal-inner"/>
  </g>

  <circle cx="256" cy="240" r="38" class="center"/>
  <circle cx="256" cy="230" r="5" class="center-dot"/>
  <circle cx="246" cy="244" r="4" class="center-dot"/>
  <circle cx="266" cy="244" r="4" class="center-dot"/>
  <circle cx="256" cy="256" r="4" class="center-dot"/>
  <circle cx="240" cy="236" r="3" class="center-dot"/>
  <circle cx="272" cy="236" r="3" class="center-dot"/>
</svg>
